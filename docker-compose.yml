services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/url_shortener
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me
      SESSION_SECRET_KEY: change-me-too
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60
      GUEST_CREATE_LIMIT_PER_MINUTE: 10
      GUEST_MAX_ACTIVE_LINKS: 100
      EXPIRY_CLEANUP_INTERVAL_SECONDS: 60
      EXPIRY_CLEANUP_BATCH_SIZE: 500
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
